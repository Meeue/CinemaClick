<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tickets — Cinema Admin</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app" id="app"></div>

<script src="data.js"></script>
<script src="layout.js"></script>
<script>
injectLayout({page:'tickets', title:'Tickets', sub:'Issued tickets'});

/*
 * ── PHP/MySQL Integration Notes ────────────────────────────────────────────
 * READ  → GET    api/tickets.php           (route to SLAVE  DB)
 * WRITE → POST   api/tickets.php           (route to MASTER DB)
 * DEL   → DELETE api/tickets.php?id=X      (route to MASTER DB)
 *
 * SQL schema:
 * CREATE TABLE tickets (
 *   ticket_id    VARCHAR(15) PRIMARY KEY,
 *   booking_id   VARCHAR(15) NOT NULL,
 *   seat_id      VARCHAR(15) NOT NULL,
 *   ticket_price DECIMAL(10,2) NOT NULL,
 *   issued_at    DATETIME DEFAULT CURRENT_TIMESTAMP,
 *   FOREIGN KEY (booking_id) REFERENCES bookings(booking_id),
 *   FOREIGN KEY (seat_id)    REFERENCES seats(seat_id)
 * );
 */

// Auto-generate sample tickets from bookings × seats
var tickets = (function(){
  var result = [], tid = 1;
  bookings.slice(0,6).forEach(function(bk){
    var st = showtimes.find(function(s){return s.showtime_id===bk.showtime_id;});
    if(!st) return;
    var scSeats = seats.filter(function(s){return s.screen_id===st.screen_id;});
    var numTickets = Math.floor(Math.random()*3)+1;
    for(var i=0;i<numTickets && i<scSeats.length;i++){
      result.push({
        ticket_id:   'TKT-'+String(tid).padStart(4,'0'),
        booking_id:  bk.booking_id,
        seat_id:     scSeats[i].seat_id,
        seat_number: scSeats[i].seat_number,
        ticket_price: st.price,
        issued_at:   bk.booking_date
      });
      tid++;
    }
  });
  return result;
})();

var tkPg = {v:1};

document.getElementById('pageContent').innerHTML = `
<div class="info-banner">
  <div class="info-banner-icon">🎫</div>
  <div>
    <div class="info-banner-title">Issued Tickets</div>
    <div class="info-banner-text">
      Each ticket represents one seat assigned to a booking. Tickets are auto-generated when a booking is confirmed.
      Once connected to MySQL, tickets will be read from the <strong>tickets</strong> table via your slave DB.
      The sample data below is derived from existing bookings and seats.
    </div>
  </div>
</div>

<div class="schema-block">
  <div class="schema-header">🗄️ &nbsp; tickets — Table Schema</div>
  <table class="schema-table">
    <thead><tr><th>Column</th><th>Type</th><th>Key</th><th>Description</th></tr></thead>
    <tbody>
      <tr><td>ticket_id</td>   <td>VARCHAR(15)</td>    <td><span class="col-pk">PK</span></td>  <td>Unique ticket identifier</td></tr>
      <tr><td>booking_id</td>  <td>VARCHAR(15)</td>    <td><span class="col-fk">FK</span></td>  <td>References bookings.booking_id</td></tr>
      <tr><td>seat_id</td>     <td>VARCHAR(15)</td>    <td><span class="col-fk">FK</span></td>  <td>References seats.seat_id</td></tr>
      <tr><td>ticket_price</td><td>DECIMAL(10,2)</td>  <td></td>                                <td>Price at time of issue</td></tr>
      <tr><td>issued_at</td>   <td>DATETIME</td>       <td></td>                                <td>Auto-set on INSERT</td></tr>
    </tbody>
  </table>
</div>

<div class="toolbar">
  <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="tkSearch" placeholder="Search ticket ID, booking, seat…" oninput="renderTickets()"/></div>
  <select class="filter-select" id="tkScreen" onchange="renderTickets()">
    <option value="">All Screens</option>
  </select>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Ticket ID</th><th>Booking ID</th><th>Customer</th><th>Movie</th>
        <th>Seat</th><th>Price</th><th>Issued</th><th style="text-align:center">Actions</th>
      </tr>
    </thead>
    <tbody id="tkBody"></tbody>
  </table>
  <div class="table-footer"><div class="table-count" id="tkCount"></div><div class="pagination" id="tkPag"></div></div>
</div>`;

// Populate screen filter
var tkScreenSel = document.getElementById('tkScreen');
screens.forEach(function(sc){
  var o = document.createElement('option'); o.value=sc.screen_id; o.textContent=sc.screen_name+' — '+CiN(sc.cinema_id); tkScreenSel.appendChild(o);
});

function getTicketDetails(tk){
  var bk = bookings.find(function(b){return b.booking_id===tk.booking_id;});
  var st = bk ? showtimes.find(function(s){return s.showtime_id===bk.showtime_id;}) : null;
  var se = seats.find(function(s){return s.seat_id===tk.seat_id;});
  return { customer: bk?bk.customer_name:'—', movie: st?MN(st.movie_id):'—', screen_id: st?st.screen_id:'', seat: se?se.seat_number:tk.seat_number||'—' };
}

function renderTickets(){
  var q  = document.getElementById('tkSearch').value.toLowerCase();
  var sc = document.getElementById('tkScreen').value;
  var data = tickets.filter(function(tk){
    var det = getTicketDetails(tk);
    return (!q || tk.ticket_id.toLowerCase().includes(q) || tk.booking_id.toLowerCase().includes(q) || det.seat.toLowerCase().includes(q) || det.customer.toLowerCase().includes(q))
        && (!sc || det.screen_id===sc);
  });
  makeTable(data, 8, function(tk){
    var d = getTicketDetails(tk);
    return '<td class="td-mono">'+tk.ticket_id+'</td>'
      +'<td class="td-mono">'+tk.booking_id+'</td>'
      +'<td class="td-bold" style="font-size:12px">'+d.customer+'</td>'
      +'<td style="font-size:12px;color:var(--text-secondary)">'+d.movie+'</td>'
      +'<td><span style="font-size:12px;font-weight:700;color:var(--primary)">'+d.seat+'</span></td>'
      +'<td style="font-weight:600;color:var(--text-primary)">₱'+tk.ticket_price+'</td>'
      +'<td class="td-muted">'+tk.issued_at+'</td>'
      +'<td style="text-align:center"><div class="actions" style="justify-content:center"><button class="btn btn-ghost btn-sm" onclick="vTicket(\''+tk.ticket_id+'\')">View</button></div></td>';
  }, 'tkBody','tkCount','tkPag', 10, tkPg);
  document.getElementById('tkPag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderTickets); });
}

function vTicket(id){
  var tk = tickets.find(function(x){return x.ticket_id===id;});
  var d  = getTicketDetails(tk);
  var se = seats.find(function(s){return s.seat_id===tk.seat_id;});
  showView('Ticket Details',
    vf('Ticket ID',tk.ticket_id)+vf('Booking ID',tk.booking_id)+
    vf('Customer',d.customer)+vf('Movie',d.movie)+
    vf('Seat',d.seat+(se?' ('+se.seat_type+')':''))+vf('Price','₱'+tk.ticket_price)+
    vf('Issued',tk.issued_at,true),
    null
  );
}

document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
});
renderTickets();
</script>
</body>
</html>
