<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Cinemas — Cinema Admin</title>
    <link rel="stylesheet" href="styles.css"/>
  </head>
  <body>
    <div class="app" id="app"></div>

    <!-- CINEMA MODAL -->
    <div class="modal-overlay" id="cinemaModal">
      <div class="modal">
        <div class="modal-header"><div class="modal-title" id="ciModalTitle">Add Cinema</div><button class="modal-close" onclick="CM('cinemaModal')">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full"><label class="form-label">Cinema Name *</label><input class="form-input" id="fCiName" placeholder="e.g. SM Seaside Cebu Cinema"/></div>
            <div class="form-group full"><label class="form-label">Location *</label><input class="form-input" id="fCiLoc" placeholder="e.g. SRP, Cebu City"/></div>
            <div class="form-group"><label class="form-label">Contact Number *</label><input class="form-input" id="fCiCon" placeholder="032-234-5678"/></div>
            <div class="form-group"><label class="form-label">Cinema ID (auto)</label><input class="form-input" id="fCiId" disabled style="opacity:.4"/></div>
          </div>
          <div class="form-err" id="ciErr"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-ghost" onclick="CM('cinemaModal')">Cancel</button><button class="btn btn-primary" onclick="saveCinema()">Save Cinema</button></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="layout.js"></script>
    <script>
      injectLayout({page:'cinemas', title:'Cinemas', sub:'Venue management', actionLabel:'+ Add Cinema'});

      document.getElementById('pageContent').innerHTML = `
        <div class="toolbar">
          <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="ciSearch" placeholder="Search cinema, location…" oninput="renderCinemas()"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Cinema ID</th><th>Cinema Name</th><th>Location</th><th>Contact Number</th><th>Screens</th><th style="text-align:right">Actions</th></tr></thead>
            <tbody id="ciBody"></tbody>
          </table>
          <div class="table-footer"><div class="table-count" id="ciCount"></div><div class="pagination" id="ciPag"></div></div>
        </div>
      `;

      document.getElementById('topbarAction').onclick = function(){ openCinemaModal('add'); };

      var ET = {entity:null, id:null};
      var ciPg = {v:1};

      function renderCinemas(){
        var q = document.getElementById('ciSearch').value.toLowerCase();
        var data = cinemas.filter(function(c){
          return !q || c.cinema_name.toLowerCase().includes(q) || c.location.toLowerCase().includes(q);
        });
        makeTable(data, 6, function(c){
          var n = screens.filter(function(s){return s.cinema_id===c.cinema_id;}).length;
          return '<td class="td-mono">'+c.cinema_id+'</td>'
            +'<td class="td-bold">'+c.cinema_name+'</td>'
            +'<td>'+c.location+'</td>'
            +'<td>'+c.contact_number+'</td>'
            +'<td>'+n+' screen'+(n!==1?'s':'')+'</td>'
            +'<td style="text-align:right">'+ABtns('vCinema(\''+c.cinema_id+'\')','openCinemaModal(\'edit\',\''+c.cinema_id+'\')','dCinema(\''+c.cinema_id+'\')')+'</td>';
        }, 'ciBody','ciCount','ciPag',8,ciPg);
        document.getElementById('ciPag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderCinemas); });
      }

      function vCinema(id){
        var c = cinemas.find(function(x){return x.cinema_id===id;});
        var n = screens.filter(function(s){return s.cinema_id===id;}).length;
        showView(c.cinema_name,
          vf('Cinema ID',c.cinema_id)+vf('Cinema Name',c.cinema_name,true)+
          vf('Location',c.location,true)+vf('Contact Number',c.contact_number)+vf('Total Screens',n),
          function(){ openCinemaModal('edit', id); }
        );
      }

      function dCinema(id){
        var c = cinemas.find(function(x){return x.cinema_id===id;});
        showDelete('Delete Cinema', c?.cinema_name, function(){
          cinemas = cinemas.filter(function(x){return x.cinema_id!==id;});
          renderCinemas();
        });
      }

      function openCinemaModal(mode, id){
        ET = {entity:'cinema', id: mode==='edit' ? id : null};
        var c = mode==='edit' ? cinemas.find(function(x){return x.cinema_id===id;}) : null;
        document.getElementById('ciModalTitle').textContent = mode==='edit' ? 'Edit Cinema' : 'Add Cinema';
        document.getElementById('fCiId').value   = c ? c.cinema_id : 'CIN-'+String(ciCtr+1).padStart(3,'0');
        document.getElementById('fCiName').value = c ? c.cinema_name : '';
        document.getElementById('fCiLoc').value  = c ? c.location : '';
        document.getElementById('fCiCon').value  = c ? c.contact_number : '';
        document.getElementById('ciErr').style.display='none';
        OM('cinemaModal');
      }

      function saveCinema(){
        var n = document.getElementById('fCiName').value.trim();
        var l = document.getElementById('fCiLoc').value.trim();
        var c = document.getElementById('fCiCon').value.trim();
        var e = document.getElementById('ciErr');
        if(!n||!l||!c){e.textContent='Please fill in all required fields.';e.style.display='block';return;}
        e.style.display='none';
        if(ET.id){
          Object.assign(cinemas.find(function(x){return x.cinema_id===ET.id;}), {cinema_name:n,location:l,contact_number:c});
        } else {
          ciCtr++;
          cinemas.unshift({cinema_id:'CIN-'+String(ciCtr).padStart(3,'0'),cinema_name:n,location:l,contact_number:c});
        }
        CM('cinemaModal');
        renderCinemas();
      }

      document.querySelectorAll('.modal-overlay').forEach(function(o){
        o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
      });

      renderCinemas();
    </script>
  </body>
</html>
