<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Payments — Cinema Admin</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app" id="app"></div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="pyModalTitle">Add Payment</div>
      <button class="modal-close" onclick="CM('paymentModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Booking *</label>
          <select class="form-select" id="fPyBook"><option value="">Select booking</option></select>
        </div>
        <div class="form-group"><label class="form-label">Amount (₱) *</label>
          <input class="form-input" id="fPyAmt" type="number" min="0" placeholder="600"/>
        </div>
        <div class="form-group"><label class="form-label">Payment Method *</label>
          <select class="form-select" id="fPyMethod">
            <option value="">Select</option>
            <option value="Cash">Cash</option>
            <option value="GCash">GCash</option>
            <option value="Maya">Maya</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status *</label>
          <select class="form-select" id="fPyStatus">
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
            <option value="Failed">Failed</option>
            <option value="Refunded">Refunded</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Payment Date *</label>
          <input class="form-input" id="fPyDate" type="date"/>
        </div>
        <div class="form-group"><label class="form-label">Payment ID (auto)</label>
          <input class="form-input" id="fPyId" disabled style="opacity:.4"/>
        </div>
      </div>
      <div class="form-err" id="pyErr"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="CM('paymentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Save Payment</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="layout.js"></script>
<script>
injectLayout({page:'payments', title:'Payments', sub:'Transaction records', actionLabel:'+ Add Payment'});

/*
 * ── PHP/MySQL Integration Notes ────────────────────────────────────────────
 * READ  → GET    api/payments.php           (route to SLAVE  DB)
 * WRITE → POST   api/payments.php           (route to MASTER DB)
 * EDIT  → PUT    api/payments.php?id=X      (route to MASTER DB)
 * DEL   → DELETE api/payments.php?id=X      (route to MASTER DB)
 *
 * SQL schema:
 * CREATE TABLE payments (
 *   payment_id      VARCHAR(15) PRIMARY KEY,
 *   booking_id      VARCHAR(15) NOT NULL,
 *   payment_date    DATE        NOT NULL,
 *   payment_method  ENUM('Cash','GCash','Maya','Credit Card','Debit Card') NOT NULL,
 *   payment_status  ENUM('Paid','Pending','Failed','Refunded') DEFAULT 'Pending',
 *   amount          DECIMAL(10,2) NOT NULL,
 *   FOREIGN KEY (booking_id) REFERENCES bookings(booking_id)
 * );
 */

var payments = [
  {payment_id:'PAY-001', booking_id:'BK-00482', payment_date:'2026-04-20', payment_method:'GCash',       payment_status:'Paid',     amount:500},
  {payment_id:'PAY-002', booking_id:'BK-00481', payment_date:'2026-04-20', payment_method:'Credit Card', payment_status:'Paid',     amount:1200},
  {payment_id:'PAY-003', booking_id:'BK-00480', payment_date:'2026-04-19', payment_method:'Cash',        payment_status:'Pending',  amount:300},
  {payment_id:'PAY-004', booking_id:'BK-00479', payment_date:'2026-04-19', payment_method:'Maya',        payment_status:'Refunded', amount:600},
  {payment_id:'PAY-005', booking_id:'BK-00478', payment_date:'2026-04-18', payment_method:'GCash',       payment_status:'Paid',     amount:750},
  {payment_id:'PAY-006', booking_id:'BK-00477', payment_date:'2026-04-17', payment_method:'Debit Card',  payment_status:'Paid',     amount:900},
  {payment_id:'PAY-007', booking_id:'BK-00476', payment_date:'2026-04-17', payment_method:'Cash',        payment_status:'Failed',   amount:400},
];

var pyCtr = payments.length;
var ET    = {entity:null, id:null};
var pyPg  = {v:1};

var STATUS_CLR   = {Paid:'p-green', Pending:'p-yellow', Failed:'p-red', Refunded:'p-purple'};
var METHOD_ICONS = {Cash:'💵', GCash:'📱', Maya:'📱', 'Credit Card':'💳', 'Debit Card':'🏦'};

document.getElementById('pageContent').innerHTML = `
<div class="info-banner">
  <div class="info-banner-icon">💳</div>
  <div>
    <div class="info-banner-title">Payment Transactions</div>
    <div class="info-banner-text">
      All booking payment records. Each payment is linked to a booking via <strong>booking_id</strong>.
      Once connected to MySQL, totals and summaries can be aggregated server-side using your slave DB for reads.
    </div>
  </div>
</div>

<div class="stats-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;">
  <div class="stat-card"><div class="stat-label">Total Collected</div><div class="stat-value" id="statTotal">—</div><div class="stat-change up">All time</div></div>
  <div class="stat-card"><div class="stat-label">Paid</div><div class="stat-value" id="statPaid">—</div><div class="stat-change up">Completed</div></div>
  <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="statPending">—</div><div class="stat-change down">Awaiting</div></div>
  <div class="stat-card"><div class="stat-label">Refunded</div><div class="stat-value" id="statRefund">—</div><div class="stat-change down">Reversed</div></div>
</div>

<div class="toolbar">
  <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="pySearch" placeholder="Search payment ID, booking…" oninput="renderPayments()"/></div>
  <select class="filter-select" id="pyMethod" onchange="renderPayments()">
    <option value="">All Methods</option>
    <option value="Cash">Cash</option>
    <option value="GCash">GCash</option>
    <option value="Maya">Maya</option>
    <option value="Credit Card">Credit Card</option>
    <option value="Debit Card">Debit Card</option>
  </select>
  <select class="filter-select" id="pyStatus" onchange="renderPayments()">
    <option value="">All Statuses</option>
    <option value="Paid">Paid</option>
    <option value="Pending">Pending</option>
    <option value="Failed">Failed</option>
    <option value="Refunded">Refunded</option>
  </select>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Payment ID</th><th>Booking ID</th><th>Customer</th><th>Method</th>
        <th>Amount</th><th>Status</th><th>Date</th><th style="text-align:right">Actions</th>
      </tr>
    </thead>
    <tbody id="pyBody"></tbody>
  </table>
  <div class="table-footer"><div class="table-count" id="pyCount"></div><div class="pagination" id="pyPag"></div></div>
</div>`;

document.getElementById('topbarAction').onclick = function(){ openPaymentModal('add'); };

function updateStats(){
  var paid    = payments.filter(function(p){return p.payment_status==='Paid';}).reduce(function(s,p){return s+p.amount;},0);
  var pending = payments.filter(function(p){return p.payment_status==='Pending';}).length;
  var refund  = payments.filter(function(p){return p.payment_status==='Refunded';}).reduce(function(s,p){return s+p.amount;},0);
  var total   = payments.filter(function(p){return p.payment_status==='Paid'||p.payment_status==='Pending';}).reduce(function(s,p){return s+p.amount;},0);
  document.getElementById('statTotal').textContent   = '₱'+total.toLocaleString();
  document.getElementById('statPaid').textContent    = '₱'+paid.toLocaleString();
  document.getElementById('statPending').textContent = pending+' txn'+(pending!==1?'s':'');
  document.getElementById('statRefund').textContent  = '₱'+refund.toLocaleString();
}

function getCustomerName(bookingId){
  var bk = bookings.find(function(b){return b.booking_id===bookingId;});
  return bk ? bk.customer_name : '—';
}

function renderPayments(){
  var q  = document.getElementById('pySearch').value.toLowerCase();
  var mf = document.getElementById('pyMethod').value;
  var sf = document.getElementById('pyStatus').value;
  var data = payments.filter(function(p){
    return (!q || p.payment_id.toLowerCase().includes(q) || p.booking_id.toLowerCase().includes(q) || getCustomerName(p.booking_id).toLowerCase().includes(q))
        && (!mf || p.payment_method===mf)
        && (!sf || p.payment_status===sf);
  });
  makeTable(data, 8, function(p){
    var icon = METHOD_ICONS[p.payment_method]||'💰';
    return '<td class="td-mono">'+p.payment_id+'</td>'
      +'<td class="td-mono">'+p.booking_id+'</td>'
      +'<td class="td-bold" style="font-size:12px">'+getCustomerName(p.booking_id)+'</td>'
      +'<td><span style="font-size:12px">'+icon+' '+p.payment_method+'</span></td>'
      +'<td style="font-weight:700;color:var(--primary)">₱'+p.amount.toLocaleString()+'</td>'
      +'<td><span class="pill '+(STATUS_CLR[p.payment_status]||'p-gray')+'">'+p.payment_status+'</span></td>'
      +'<td class="td-muted">'+p.payment_date+'</td>'
      +'<td style="text-align:right">'+ABtns('vPayment(\''+p.payment_id+'\')','openPaymentModal(\'edit\',\''+p.payment_id+'\')','dPayment(\''+p.payment_id+'\')')+'</td>';
  }, 'pyBody','pyCount','pyPag', 8, pyPg);
  document.getElementById('pyPag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderPayments); });
  updateStats();
}

function vPayment(id){
  var p = payments.find(function(x){return x.payment_id===id;});
  showView('Payment Details',
    vf('Payment ID',p.payment_id)+vf('Booking ID',p.booking_id)+
    vf('Customer',getCustomerName(p.booking_id))+vf('Method',(METHOD_ICONS[p.payment_method]||'')+ ' '+p.payment_method)+
    vf('Amount','₱'+p.amount.toLocaleString())+
    '<div class="vf"><div class="vf-label">Status</div><div class="vf-value"><span class="pill '+(STATUS_CLR[p.payment_status]||'')+'">'+p.payment_status+'</span></div></div>'+
    vf('Date',p.payment_date),
    function(){ openPaymentModal('edit', id); }
  );
}

function dPayment(id){
  var p = payments.find(function(x){return x.payment_id===id;});
  showDelete('Delete Payment', p.payment_id, function(){
    payments = payments.filter(function(x){return x.payment_id!==id;});
    renderPayments();
  });
}

function openPaymentModal(mode, id){
  ET = {entity:'payment', id: mode==='edit'?id:null};
  var p = mode==='edit' ? payments.find(function(x){return x.payment_id===id;}) : null;
  document.getElementById('pyModalTitle').textContent = mode==='edit'?'Edit Payment':'Add Payment';
  document.getElementById('fPyId').value     = p ? p.payment_id : 'PAY-'+String(pyCtr+1).padStart(3,'0');
  document.getElementById('fPyAmt').value    = p ? p.amount : '';
  document.getElementById('fPyMethod').value = p ? p.payment_method : '';
  document.getElementById('fPyStatus').value = p ? p.payment_status : 'Paid';
  document.getElementById('fPyDate').value   = p ? p.payment_date : new Date().toISOString().split('T')[0];
  var bkSel = document.getElementById('fPyBook');
  bkSel.innerHTML = '<option value="">Select booking</option>';
  bookings.forEach(function(b){ var o=document.createElement('option'); o.value=b.booking_id; o.textContent=b.booking_id+' — '+b.customer_name; bkSel.appendChild(o); });
  if(p) bkSel.value = p.booking_id;
  document.getElementById('pyErr').style.display='none';
  OM('paymentModal');
}

function savePayment(){
  var bk=document.getElementById('fPyBook').value, am=+document.getElementById('fPyAmt').value;
  var mt=document.getElementById('fPyMethod').value, st=document.getElementById('fPyStatus').value;
  var dt=document.getElementById('fPyDate').value;
  var e=document.getElementById('pyErr');
  if(!bk||!am||!mt||!st||!dt){e.textContent='Please fill in all required fields.';e.style.display='block';return;}
  e.style.display='none';
  if(ET.id){
    Object.assign(payments.find(function(x){return x.payment_id===ET.id;}),{booking_id:bk,amount:am,payment_method:mt,payment_status:st,payment_date:dt});
  } else {
    pyCtr++;
    payments.unshift({payment_id:'PAY-'+String(pyCtr).padStart(3,'0'),booking_id:bk,payment_date:dt,payment_method:mt,payment_status:st,amount:am});
  }
  CM('paymentModal'); renderPayments();
}

document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
});
renderPayments();
</script>
</body>
</html>
