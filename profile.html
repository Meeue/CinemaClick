<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Profile — Cinema Admin</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app" id="app"></div>
<div class="save-toast" id="saveToast">✓ &nbsp; Changes saved successfully</div>

<script src="data.js"></script>
<script src="layout.js"></script>
<script>
injectLayout({page:'profile', title:'My Profile', sub:'Account settings'});

document.getElementById('pageContent').innerHTML = `
<div class="profile-layout">

  <!-- LEFT: Avatar card -->
  <div>
    <div class="profile-card">
      <div class="profile-avatar-lg" id="avatarCircle">
        JD
        <div class="profile-avatar-edit" onclick="document.getElementById('avatarFileInput').click()" title="Change photo">✏️</div>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)"/>
      <div class="profile-name" id="displayName">Juan Dela Cruz</div>
      <div class="profile-role" id="displayRole">Administrator</div>
      <hr class="profile-divider"/>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-val">3</div>
          <div class="profile-stat-lbl">Cinemas</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val">${bookings.length}</div>
          <div class="profile-stat-lbl">Bookings</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val">${movies.length}</div>
          <div class="profile-stat-lbl">Movies</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val">${screens.length}</div>
          <div class="profile-stat-lbl">Screens</div>
        </div>
      </div>
      <hr class="profile-divider"/>
      <div style="text-align:left">
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:10px">Account Info</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)"><span style="font-size:14px">📧</span><span id="sideEmail">admin@cinema.ph</span></div>
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)"><span style="font-size:14px">📱</span><span id="sidePhone">0917-000-0001</span></div>
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)"><span style="font-size:14px">📍</span><span id="sideBranch">SM Seaside Cebu</span></div>
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)"><span style="font-size:14px">📅</span><span>Member since Jan 2025</span></div>
        </div>
      </div>
    </div>

    <div style="margin-top:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm)">
      <div style="font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:6px">🔐 &nbsp; Active Sessions</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="padding:10px 12px;background:var(--primary-light);border:1px solid var(--primary-mid);border-radius:8px">
          <div style="font-size:12px;font-weight:600;color:var(--primary)">This device</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">Chrome · Cebu City · Active now</div>
        </div>
        <div style="padding:10px 12px;background:var(--bg-app);border:1px solid var(--border);border-radius:8px">
          <div style="font-size:12px;font-weight:500;color:var(--text-secondary)">Mobile app</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">iOS · Last seen Apr 20</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Form panels -->
  <div>
    <div class="profile-form-panel">

      <!-- Personal Information -->
      <div class="profile-form-section">
        <div class="profile-section-title">
          <div class="profile-section-icon">👤</div>
          Personal Information
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">First Name *</label>
            <input class="form-input" id="pfFirstName" value="Juan" oninput="syncDisplay()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name *</label>
            <input class="form-input" id="pfLastName" value="Dela Cruz" oninput="syncDisplay()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address *</label>
            <input class="form-input" id="pfEmail" type="email" value="admin@cinema.ph" oninput="syncDisplay()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input class="form-input" id="pfPhone" value="0917-000-0001" oninput="syncDisplay()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select class="form-select" id="pfRole" onchange="syncDisplay()">
              <option value="Administrator" selected>Administrator</option>
              <option value="Manager">Manager</option>
              <option value="Cashier">Cashier</option>
              <option value="Staff">Staff</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Assigned Branch</label>
            <select class="form-select" id="pfBranch" onchange="syncDisplay()">
              <option value="SM Seaside Cebu" selected>SM Seaside Cebu</option>
              <option value="Ayala Center Cebu">Ayala Center Cebu</option>
              <option value="Robinsons Galleria">Robinsons Galleria</option>
            </select>
          </div>
          <div class="form-group full">
            <label class="form-label">Bio / Notes</label>
            <textarea class="form-textarea" id="pfBio" placeholder="A short description about yourself…">Cinema system administrator. Managing all branches in Cebu.</textarea>
          </div>
        </div>
        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="savePersonal()">Save Personal Info</button>
        </div>
      </div>

      <!-- Change Password -->
      <div class="profile-form-section">
        <div class="profile-section-title">
          <div class="profile-section-icon">🔒</div>
          Change Password
        </div>
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Current Password *</label>
            <input class="form-input" id="pfCurPw" type="password" placeholder="Enter current password"/>
          </div>
          <div class="form-group">
            <label class="form-label">New Password *</label>
            <input class="form-input" id="pfNewPw" type="password" placeholder="Min. 8 characters" oninput="checkPwStrength()"/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password *</label>
            <input class="form-input" id="pfConfPw" type="password" placeholder="Re-enter new password"/>
          </div>
          <div class="form-group full" id="pwStrengthWrap" style="display:none">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px">Password strength: <span id="pwStrengthLabel" style="font-weight:700"></span></div>
            <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden"><div id="pwStrengthBar" style="height:100%;border-radius:3px;transition:width .3s,background .3s"></div></div>
          </div>
        </div>
        <div class="form-err" id="pwErr" style="display:none;margin-top:8px"></div>
        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="savePassword()">Update Password</button>
        </div>
      </div>

      <!-- Preferences -->
      <div class="profile-form-section">
        <div class="profile-section-title">
          <div class="profile-section-icon">⚙️</div>
          Preferences
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">
          ${toggle('prefEmail',  'Email Notifications',   'Receive booking & payment alerts via email', true)}
          ${toggle('prefSMS',    'SMS Notifications',     'Receive urgent alerts via SMS', false)}
          ${toggle('prefReport', 'Daily Reports',         'Get a daily summary report at 8:00 AM', true)}
          ${toggle('prefAudit',  'Audit Log Alerts',      'Be notified of DELETE operations in real time', true)}
        </div>
        <div style="margin-top:18px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="savePrefs()">Save Preferences</button>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="profile-form-section">
        <div class="profile-section-title">
          <div class="profile-section-icon" style="background:#FEF2F2">⚠️</div>
          <span style="color:var(--red)">Danger Zone</span>
        </div>
        <div style="background:var(--red-bg);border:1px solid #FECACA;border-radius:10px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--red)">Deactivate Account</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:2px">This will disable your access. A super-admin can re-enable it.</div>
          </div>
          <button class="btn btn-danger" onclick="alert('This action would require super-admin approval. Feature coming soon.')">Deactivate</button>
        </div>
      </div>

    </div>
  </div>
</div>
`;

function toggle(id, label, desc, checked){
  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">'
    +'<div><div style="font-size:13px;font-weight:500;color:var(--text-primary)">'+label+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+desc+'</div></div>'
    +'<label style="position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0">'
    +'<input type="checkbox" id="'+id+'"'+(checked?' checked':'')+'style="opacity:0;width:0;height:0"/>'
    +'<span style="position:absolute;inset:0;background:'+(checked?'var(--primary)':'#CBD5E1')+';border-radius:24px;cursor:pointer;transition:.2s" onclick="this.style.background=document.getElementById(\''+id+'\').checked?\'#CBD5E1\':\'var(--primary)\'"></span>'
    +'<span style="position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;pointer-events:none" id="'+id+'Knob"></span>'
    +'</label>'
    +'</div>';
}

function syncDisplay(){
  var fn = document.getElementById('pfFirstName').value;
  var ln = document.getElementById('pfLastName').value;
  var initials = (fn[0]||'') + (ln[0]||'');
  document.getElementById('avatarCircle').firstChild.textContent = initials.toUpperCase();
  document.getElementById('displayName').textContent  = fn+' '+ln;
  document.getElementById('displayRole').textContent  = document.getElementById('pfRole').value;
  document.getElementById('sideEmail').textContent    = document.getElementById('pfEmail').value;
  document.getElementById('sidePhone').textContent    = document.getElementById('pfPhone').value;
  document.getElementById('sideBranch').textContent   = document.getElementById('pfBranch').value;
  // also update sidebar avatar
  var sideAv = document.querySelector('.sidebar a div:first-child');
  if(sideAv) sideAv.textContent = initials.toUpperCase();
}

function handleAvatarUpload(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var av = document.getElementById('avatarCircle');
    av.style.backgroundImage = 'url('+ev.target.result+')';
    av.style.backgroundSize  = 'cover';
    av.style.backgroundPosition = 'center';
    av.firstChild.textContent = '';
  };
  reader.readAsDataURL(file);
}

function checkPwStrength(){
  var pw = document.getElementById('pfNewPw').value;
  var wrap = document.getElementById('pwStrengthWrap');
  if(!pw){wrap.style.display='none';return;}
  wrap.style.display='block';
  var score = 0;
  if(pw.length >= 8)  score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  var labels = ['','Weak','Fair','Good','Strong'];
  var colors = ['','#EF4444','#F59E0B','#3B82F6','#059669'];
  document.getElementById('pwStrengthLabel').textContent = labels[score];
  document.getElementById('pwStrengthLabel').style.color = colors[score];
  document.getElementById('pwStrengthBar').style.width   = (score*25)+'%';
  document.getElementById('pwStrengthBar').style.background = colors[score];
}

function showToast(msg){
  var t = document.getElementById('saveToast');
  t.textContent = '✓  '+msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 3000);
}

function savePersonal(){
  var fn = document.getElementById('pfFirstName').value.trim();
  var em = document.getElementById('pfEmail').value.trim();
  if(!fn||!em){alert('First name and email are required.');return;}
  syncDisplay();
  showToast('Personal information saved.');
  // TODO: PUT api/profile.php with updated data
}

function savePassword(){
  var cur  = document.getElementById('pfCurPw').value;
  var nw   = document.getElementById('pfNewPw').value;
  var conf = document.getElementById('pfConfPw').value;
  var e    = document.getElementById('pwErr');
  if(!cur||!nw||!conf){e.textContent='Please fill in all password fields.';e.style.display='block';return;}
  if(nw.length<8){e.textContent='New password must be at least 8 characters.';e.style.display='block';return;}
  if(nw!==conf){e.textContent='New passwords do not match.';e.style.display='block';return;}
  e.style.display='none';
  document.getElementById('pfCurPw').value='';
  document.getElementById('pfNewPw').value='';
  document.getElementById('pfConfPw').value='';
  document.getElementById('pwStrengthWrap').style.display='none';
  showToast('Password updated successfully.');
  // TODO: POST api/change_password.php
}

function savePrefs(){
  showToast('Preferences saved.');
  // TODO: POST api/preferences.php
}
</script>
</body>
</html>
