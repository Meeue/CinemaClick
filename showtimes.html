<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Showtimes — Cinema Admin</title>
    <link rel="stylesheet" href="styles.css"/>
  </head>
  <body>
    <div class="app" id="app"></div>

    <!-- SHOWTIME MODAL -->
    <div class="modal-overlay" id="showtimeModal">
      <div class="modal">
        <div class="modal-header"><div class="modal-title" id="stModalTitle">Add Showtime</div><button class="modal-close" onclick="CM('showtimeModal')">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Movie *</label><select class="form-select" id="fStMov"><option value="">Select movie</option></select></div>
            <div class="form-group"><label class="form-label">Screen *</label>
              <select class="form-select" id="fStScr">
                <option value="">Select screen</option>
                <option value="SCR-001">Screen 1</option>
                <option value="SCR-002">Screen 2</option>
                <option value="SCR-003">Screen 3</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Show Date *</label><input class="form-input" id="fStDate" type="date"/></div>
            <div class="form-group"><label class="form-label">Start Time *</label><input class="form-input" id="fStStart" type="time"/></div>
            <div class="form-group"><label class="form-label">End Time *</label><input class="form-input" id="fStEnd" type="time"/></div>
            <div class="form-group"><label class="form-label">Price (₱) *</label><input class="form-input" id="fStPrice" type="number" min="0" placeholder="300"/></div>
            <div class="form-group"><label class="form-label">Showtime ID (auto)</label><input class="form-input" id="fStId" disabled style="opacity:.4"/></div>
          </div>
          <div class="form-err" id="stErr"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-ghost" onclick="CM('showtimeModal')">Cancel</button><button class="btn btn-primary" onclick="saveShowtime()">Save Showtime</button></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="layout.js"></script>
    <script>
      injectLayout({page:'showtimes', title:'Showtimes', sub:'Schedule & screening times', actionLabel:'+ Add Showtime'});

      document.getElementById('pageContent').innerHTML = `
        <div class="toolbar">
          <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="stSearch" placeholder="Search movie, screen…" oninput="renderShowtimes()"></div>
          <select class="filter-select" id="stDate" onchange="renderShowtimes()">
            <option value="">All Dates</option>
            <option value="2026-04-20">Apr 20, 2026</option>
            <option value="2026-04-21">Apr 21, 2026</option>
            <option value="2026-04-22">Apr 22, 2026</option>
          </select>
          <select class="filter-select" id="stScreen" onchange="renderShowtimes()">
            <option value="">All Screens</option>
            <option value="SCR-001">Screen 1</option>
            <option value="SCR-002">Screen 2</option>
            <option value="SCR-003">Screen 3</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Showtime ID</th><th>Movie</th><th>Screen</th><th>Show Date</th><th>Start Time</th><th>End Time</th><th>Price</th><th style="text-align:center">Actions</th></tr></thead>
            <tbody id="stBody"></tbody>
          </table>
          <div class="table-footer"><div class="table-count" id="stCount"></div><div class="pagination" id="stPag"></div></div>
        </div>
      `;

      document.getElementById('topbarAction').onclick = function(){ openShowtimeModal('add'); };

      var ET = {entity:null, id:null};
      var stPg = {v:1};

      function renderShowtimes(){
        var q  = document.getElementById('stSearch').value.toLowerCase();
        var d  = document.getElementById('stDate').value;
        var sc = document.getElementById('stScreen').value;
        var data = showtimes.filter(function(s){
          return (!q || MN(s.movie_id).toLowerCase().includes(q) || ScrN(s.screen_id).toLowerCase().includes(q))
              && (!d  || s.show_date  === d)
              && (!sc || s.screen_id  === sc);
        });
        makeTable(data, 8, function(s){
          return '<td class="td-mono">'+s.showtime_id+'</td>'
            +'<td class="td-bold">'+MN(s.movie_id)+'</td>'
            +'<td>'+ScrN(s.screen_id)+'</td>'
            +'<td>'+s.show_date+'</td>'
            +'<td>'+t12(s.start_time)+'</td>'
            +'<td>'+t12(s.end_time)+'</td>'
            +'<td>₱'+s.price+'</td>'
            +'<td style="text-align:center">'+ABtns('vShowtime(\''+s.showtime_id+'\')','openShowtimeModal(\'edit\',\''+s.showtime_id+'\')','dShowtime(\''+s.showtime_id+'\')')+'</td>';
        }, 'stBody','stCount','stPag',8,stPg);
        document.getElementById('stPag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderShowtimes); });
      }

      function vShowtime(id){
        var s = showtimes.find(function(x){return x.showtime_id===id;});
        showView('Showtime Details',
          vf('Showtime ID',s.showtime_id)+vf('Movie',MN(s.movie_id))+vf('Screen',ScrN(s.screen_id))+
          vf('Show Date',s.show_date)+vf('Start Time',t12(s.start_time))+vf('End Time',t12(s.end_time))+
          vf('Price','₱'+s.price,true),
          function(){ openShowtimeModal('edit', id); }
        );
      }

      function dShowtime(id){
        var s = showtimes.find(function(x){return x.showtime_id===id;});
        showDelete('Delete Showtime', MN(s?.movie_id)+' on '+s?.show_date, function(){
          showtimes = showtimes.filter(function(x){return x.showtime_id!==id;});
          renderShowtimes();
        });
      }

      function openShowtimeModal(mode, id){
        ET = {entity:'showtime', id: mode==='edit' ? id : null};
        var s = mode==='edit' ? showtimes.find(function(x){return x.showtime_id===id;}) : null;
        document.getElementById('stModalTitle').textContent = mode==='edit' ? 'Edit Showtime' : 'Add Showtime';
        document.getElementById('fStId').value = s ? s.showtime_id : 'SHW-'+String(stCtr+1).padStart(3,'0');
        var ms = document.getElementById('fStMov');
        ms.innerHTML = '<option value="">Select movie</option>';
        movies.forEach(function(mv){ var o=document.createElement('option'); o.value=mv.movie_id; o.textContent=mv.title; ms.appendChild(o); });
        if(s){
          ms.value = s.movie_id;
          document.getElementById('fStScr').value   = s.screen_id;
          document.getElementById('fStDate').value  = s.show_date;
          document.getElementById('fStStart').value = s.start_time;
          document.getElementById('fStEnd').value   = s.end_time;
          document.getElementById('fStPrice').value = s.price;
        } else {
          ['fStScr','fStDate','fStStart','fStEnd','fStPrice'].forEach(function(x){ document.getElementById(x).value=''; });
        }
        document.getElementById('stErr').style.display='none';
        OM('showtimeModal');
      }

      function saveShowtime(){
        var mv = document.getElementById('fStMov').value;
        var sc = document.getElementById('fStScr').value;
        var dt = document.getElementById('fStDate').value;
        var st = document.getElementById('fStStart').value;
        var en = document.getElementById('fStEnd').value;
        var pr = +document.getElementById('fStPrice').value;
        var e  = document.getElementById('stErr');
        if(!mv||!sc||!dt||!st||!en||!pr){e.textContent='Please fill in all required fields.';e.style.display='block';return;}
        e.style.display='none';
        if(ET.id){
          Object.assign(showtimes.find(function(x){return x.showtime_id===ET.id;}), {movie_id:mv,screen_id:sc,show_date:dt,start_time:st,end_time:en,price:pr});
        } else {
          stCtr++;
          showtimes.unshift({showtime_id:'SHW-'+String(stCtr).padStart(3,'0'),movie_id:mv,screen_id:sc,show_date:dt,start_time:st,end_time:en,price:pr});
        }
        CM('showtimeModal');
        renderShowtimes();
      }

      document.querySelectorAll('.modal-overlay').forEach(function(o){
        o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
      });

      renderShowtimes();
    </script>
  </body>
</html>
