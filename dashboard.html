        <div class="seat-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--bg-surface2);border:.5px solid var(--border-md)"></div>Available</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Taken</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Selected</div>

</div>

        <div class="db-st-row"><div><div class="show-time">12:30 PM</div><div class="show-screen">Screen 2</div></div><div><div class="show-film">Girl, Boy, Bakla, Tomboy</div></div><div class="seat-bar"><div class="seat-fill"><div class="seat-filled" style="width:62%"></div></div><span class="seat-pct">62%</span></div></div>
        <div class="db-st-row"><div><div class="show-time">3:00 PM</div><div class="show-screen">Screen 1</div></div><div><div class="show-film">Kung Fu Panda 2</div></div><div class="seat-bar"><div class="seat-fill"><div class="seat-filled" style="width:45%"></div></div><span class="seat-pct">45%</span></div></div>
        <div class="db-st-row"><div><div class="show-time">6:15 PM</div><div class="show-screen">Screen 3</div></div><div><div class="show-film">Spongebob</div></div><div class="seat-bar"><div class="seat-fill"><div class="seat-filled" style="width:79%"></div></div><span class="seat-pct">79%</span></div></div>
        <div class="db-st-row"><div><div class="show-time">9:00 PM</div><div class="show-screen">Screen 4</div></div><div><div class="show-film">Kung Fu Panda 2</div></div><div class="seat-bar"><div class="seat-fill"><div class="seat-filled" style="width:31%"></div></div><span class="seat-pct">31%</span></div></div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header"><div class="panel-title">Recent bookings</div><a class="panel-action" href="bookings.html">view all →</a></div>
    <div class="panel-body">
      <div class="db-bk-list">
        <div class="db-bk-item"><div><div class="td-mono">#BK-00482</div><div style="font-size:12px;font-weight:500;color:var(--text)">Maria Santos</div><div style="font-size:11px;color:var(--text-muted)">Spongebob · 2 seats</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:500;color:var(--text)">₱500</div><span class="pill p-green">Confirmed</span></div></div>
        <div class="db-bk-item"><div><div class="td-mono">#BK-00481</div><div style="font-size:12px;font-weight:500;color:var(--text)">Juan dela Cruz</div><div style="font-size:11px;color:var(--text-muted)">Girl, Boy, Bakla, Tomboy · 4 seats</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:500;color:var(--text)">₱1,200</div><span class="pill p-green">Confirmed</span></div></div>

        <div class="db-bk-item"><div><div class="td-mono">#BK-00479</div><div style="font-size:12px;font-weight:500;color:var(--text)">Pedro Lim</div><div style="font-size:11px;color:var(--text-muted)">Kung Fu Panda 2 · 2 seats</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:500;color:var(--text)">₱600</div><span class="pill p-red">Cancelled</span></div></div>

// ── Screen data: each screen has its own seat layout ──
var screenData = {
  'Screen 1': {
    rows: ['A','B','C','D','E','F','G'], cols: 10,
    taken:    ['A3','A4','B5','B6','C2','C7','D4','D5','D6','E1','E8','F3','F9','G5'],
    vipRows:  ['A','B'],
    selected: ['C4','C5']
  },
  'Screen 2': {
    rows: ['A','B','C','D','E','F'], cols: 12,
    taken:    ['A1','A2','B3','B8','C5','C6','D2','D9','E4','E10','F1','F6'],
    vipRows:  ['A'],
    selected: ['B5','B6']
  },
  'Screen 3': {
    rows: ['A','B','C','D','E'], cols: 8,
    taken:    ['A2','B4','C3','C5','D1','D6','E2','E7'],
    vipRows:  ['A','B'],
    selected: ['C4']
  },
  'Screen 4': {
    rows: ['A','B','C','D','E','F','G','H'], cols: 14,
    taken:    ['A5','A6','B3','B9','C4','C10','D2','D7','D12','E6','E8','F1','F13','G5','G9','H3','H11'],
    vipRows:  ['A','B','C'],
    selected: ['D5','D6','D7']
  }
};

var currentScreen = 'Screen 1';

function buildScreenTabs(){
  var container = document.getElementById('dbScreenTabs');
  Object.keys(screenData).forEach(function(name){
    var btn = document.createElement('button');
    btn.textContent = name.replace('Screen ','S');
    btn.style.cssText = 'padding:3px 8px;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;border:.5px solid;transition:all .15s;font-family:inherit;';
    btn.dataset.screen = name;
    btn.id = 'stab-' + name.replace(' ','-');
    btn.addEventListener('click', function(){
      switchScreen(name);
    });
    container.appendChild(btn);
  });
  styleScreenTabs();
}

function styleScreenTabs(){
  Object.keys(screenData).forEach(function(name){
    var btn = document.getElementById('stab-' + name.replace(' ','-'));
    if(!btn) return;
    if(name === currentScreen){
      btn.style.background = 'var(--accent)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--accent)';
    } else {
      btn.style.background = 'var(--bg-surface)';
      btn.style.color = 'var(--text-muted)';
      btn.style.borderColor = 'var(--border-md)';
    }
  });
}

function switchScreen(name){
  currentScreen = name;
  document.getElementById('dbScreenLabel').textContent = name;
  styleScreenTabs();
  renderSeatMap();
}

function renderSeatMap(){
  var cfg  = screenData[currentScreen];
  var takenSet    = new Set(cfg.taken);
  var vipSet      = new Set(cfg.vipRows);
  var selectedSet = new Set(cfg.selected);
  var map  = document.getElementById('dbSeatMap');
  var half = Math.floor(cfg.cols / 2);
  map.innerHTML = '';

  cfg.rows.forEach(function(row){
    var re = document.createElement('div');
    re.className = 'seat-row-db';
    var lb = document.createElement('div');
    lb.className = 'row-lbl';
    lb.textContent = row;
    re.appendChild(lb);

    for(var c = 1; c <= cfg.cols; c++){
      if(c === half + 1){
        var g = document.createElement('div');
        g.className = 'seat-gap-db';
        re.appendChild(g);
      }
      var key = row + c;
      var s = document.createElement('div');
      s.className = 'db-seat';
      if(selectedSet.has(key)){
        s.classList.add('selected');
      } else if(takenSet.has(key)){
        s.classList.add('taken');
      } else if(vipSet.has(row)){
        s.classList.add('vip');
      } else {
        s.classList.add('available');
      }
      s.addEventListener('click', (function(seat, rowLetter){
        return function(){
          if(seat.classList.contains('taken')) return;
          var cfg2 = screenData[currentScreen];
          var vipR = new Set(cfg2.vipRows);
          if(seat.classList.contains('selected')){
            seat.classList.remove('selected');
            seat.classList.add(vipR.has(rowLetter) ? 'vip' : 'available');
          } else {
            seat.classList.remove('available','vip');
            seat.classList.add('selected');
          }
        };
      })(s, row));
      re.appendChild(s);
    }
    map.appendChild(re);
  });
}

buildScreenTabs();
renderSeatMap();
</script>
</body>
</html>
