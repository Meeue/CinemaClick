// ── Screen data: each screen has its own seat layout ──
var currentScreen = 'Screen 1';

function buildScreenTabs(){
  var container = document.getElementById('dbScreenTabs');
  screens.forEach(function(sc){
    var btn = document.createElement('button');
    btn.textContent = sc.screen_name.replace('Screen ','S');
    btn.style.cssText = 'padding:3px 8px;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;border:.5px solid;transition:all .15s;font-family:inherit;';
    btn.dataset.screen = sc.screen_name;
    btn.id = 'stab-' + sc.screen_name.replace(' ','-');
    btn.addEventListener('click', function(){
      switchScreen(sc.screen_name);
    });
    container.appendChild(btn);
  });
  styleScreenTabs();
}

function styleScreenTabs(){
  screens.forEach(function(sc){
    var btn = document.getElementById('stab-' + sc.screen_name.replace(' ','-'));
    if(!btn) return;
    if(sc.screen_name === currentScreen){
      btn.style.background = 'var(--accent)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--accent)';
    } else {
      btn.style.background = 'var(--bg-surface)';
      btn.style.color = 'var(--text-muted)';
      btn.style.borderColor = 'var(--border-md)';
    }
  });
}

function switchScreen(name){
  currentScreen = name;
  document.getElementById('dbScreenLabel').textContent = name;
  styleScreenTabs();
  renderSeatMap();
}

function renderSeatMap(){
  var sc = screens.find(function(x){return x.screen_name === currentScreen;});
  if(!sc) return;
  var scrSeats = seats.filter(function(s){return s.screen_id === sc.screen_id;});
  var rows = [...new Set(scrSeats.map(function(s){return s.seat_number[0];}))].sort();
  var cols = Math.max(...scrSeats.map(function(s){return parseInt(s.seat_number.slice(1));}));
  var map = document.getElementById('dbSeatMap');
  var half = Math.floor(cols / 2);
  map.innerHTML = '';

  rows.forEach(function(row){
    var re = document.createElement('div');
    re.className = 'seat-row-db';
    var lb = document.createElement('div');
    lb.className = 'row-lbl';
    lb.textContent = row;
    re.appendChild(lb);

    for(var c = 1; c <= cols; c++){
      if(c === half + 1){
        var g = document.createElement('div');
        g.className = 'seat-gap-db';
        re.appendChild(g);
      }
      var seatNum = row + c;
      var seatData = scrSeats.find(function(s){return s.seat_number === seatNum;});
      if(!seatData) continue;
      var s = document.createElement('div');
      s.className = 'db-seat';
      s.classList.add(seatData.status === 'Taken' ? 'taken' : 'available');
      re.appendChild(s);
    }
    map.appendChild(re);
  });
}

buildScreenTabs();
renderSeatMap();
</script>
