<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Seats — Cinema Admin</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  </head>
  <body>
    <div class="app" id="app"></div>

    <!-- SEAT EDIT MODAL -->
    <div class="modal-overlay" id="seatModal">
      <div class="modal">
        <div class="modal-header"><div class="modal-title">Edit Seat</div><button class="modal-close" onclick="CM('seatModal')">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Seat ID</label><input class="form-input" id="fSeId" disabled style="opacity:.4"/></div>
            <div class="form-group"><label class="form-label">Screen</label><input class="form-input" id="fSeScr" disabled style="opacity:.4"/></div>
            <div class="form-group"><label class="form-label">Seat Number</label><input class="form-input" id="fSeNum" disabled style="opacity:.4"/></div>
            </div>
            <div class="form-group full"><label class="form-label">Status *</label>
              <select class="form-select" id="fSeStat"><option>Available</option><option>Taken</option><option>Maintenance</option></select>
            </div>
          </div>
        </div>
        <div class="modal-footer"><button class="btn btn-ghost" onclick="CM('seatModal')">Cancel</button><button class="btn btn-primary" onclick="saveSeat()">Save Seat</button></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="layout.js"></script>
    <script>
      injectLayout({page:'seats', title:'Seats', sub:'Seat layout & availability'});

      document.getElementById('pageContent').innerHTML = `
        <div class="seats-top">
          <div class="screen-picker">
            <div class="panel-header"><div class="panel-title">Select Screen</div></div>
            <div id="seatPickerList"></div>
          </div>
          <div class="seat-visual-panel">
            <div class="svp-title">
              <span id="visTitle">Select a screen</span>
              <span id="visMeta" style="font-size:11px;color:rgba(255,255,235,1)"></span>
            </div>
            <div class="big-screen-bar">— S C R E E N —</div>
            <div class="vis-rows" id="visRows"></div>
            <div class="vis-legend">
              <div class="legend-item"><div class="vs va" style="display:inline-block;width:14px;height:12px;border-radius:2px 2px 0 0;margin-right:4px"></div>Available</div>
              <div class="legend-item"><div class="vs vt" style="display:inline-block;width:14px;height:12px;border-radius:2px 2px 0 0;margin-right:4px"></div>Taken</div>
            </div>
          </div>
        </div>
        <div class="toolbar" style="margin-bottom:16px">
          <div class="search-box"><span class="search-icon"><i class="fa-solid fa-magnifying-glass" style="color: #ff4520;"></i></span><input id="seSearch" placeholder="Search seat number…" oninput="renderSeats()"></div>
          <select class="filter-select" id="seScreen" onchange="renderSeats();updateVisual()">
            <option value="">All Screens</option>
          </select>
          <select class="filter-select" id="seStatus" onchange="renderSeats()">
            <option value="">All Status</option><option value="Available">Available</option><option value="Taken">Taken</option><option value="Maintenance">Maintenance</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Seat ID</th><th>Screen</th><th>Seat Number</th><th>Status</th><th style="text-align:center">Actions</th></tr></thead>
            <tbody id="seBody"></tbody>
          </table>
          <div class="table-footer"><div class="table-count" id="seCount"></div><div class="pagination" id="sePag"></div></div>
        </div>
      `;

      // Populate screen filter dropdown
      var seScreenSel = document.getElementById('seScreen');
      screens.forEach(function(sc){
        var o = document.createElement('option');
        o.value = sc.screen_id;
        o.textContent = sc.screen_name + ' — ' + CiN(sc.cinema_id);
        seScreenSel.appendChild(o);
      });

      var ET = {entity:null, id:null};
      var sePg = {v:1};

      function initSeatPicker(){
        var list = document.getElementById('seatPickerList');
        list.innerHTML = '';
        screens.forEach(function(sc, i){
          var el = document.createElement('div');
          el.className = 'screen-list-item' + (i===0?' active-screen':'');
          el.innerHTML = '<div><div class="sl-name">'+sc.screen_name+'</div><div class="sl-meta">'+CiN(sc.cinema_id)+'</div></div><div class="sl-count">'+sc.total_seats+' seats</div>';
          el.onclick = function(){
            document.querySelectorAll('.screen-list-item').forEach(function(x){x.classList.remove('active-screen');});
            el.classList.add('active-screen');
            document.getElementById('seScreen').value = sc.screen_id;
            renderSeats();
            updateVisual();
          };
          list.appendChild(el);
        });
        updateVisual();
      }

      function updateVisual(){
        var scId = document.getElementById('seScreen').value || (screens[0] && screens[0].screen_id);
        var sc   = screens.find(function(x){return x.screen_id===scId;});
        if(!sc){ document.getElementById('visRows').innerHTML=''; return; }
        document.getElementById('visTitle').textContent = sc.screen_name + ' — ' + CiN(sc.cinema_id);
        var scs = seats.filter(function(x){return x.screen_id===scId;});
        var av  = scs.filter(function(x){return x.status==='Available';}).length;
        var tk  = scs.filter(function(x){return x.status==='Taken';}).length;
        document.getElementById('visMeta').textContent = av+' available · '+tk+' taken';
        var cont = document.getElementById('visRows');
        cont.innerHTML = '';
        var rls = [...new Set(scs.map(function(s){return s.seat_number[0];}))];
        rls.forEach(function(rl){
          var rs = scs.filter(function(s){return s.seat_number[0]===rl;}).sort(function(a,b){return +a.seat_number.slice(1)-+b.seat_number.slice(1);});
          var re = document.createElement('div'); re.className='vis-row';
          var lb = document.createElement('div'); lb.className='vis-rl'; lb.textContent=rl; re.appendChild(lb);
          rs.forEach(function(s,i){
            if(i===5){var g=document.createElement('div');g.className='vis-gap';re.appendChild(g);}
            var sv=document.createElement('div'); sv.className='vs';
            sv.classList.add(s.status==='Taken'?'vt':'va');
            sv.title=s.seat_number+' · '+s.status + ' (click to edit)';
            sv.style.cursor = 'pointer';
            sv.onclick = function(){ eSeat(s.seat_id); };
            re.appendChild(sv);
          });
          cont.appendChild(re);
        });
      }

      function renderSeats(){
        var q  = document.getElementById('seSearch').value.toLowerCase();
        var sf = document.getElementById('seScreen').value;
        var st = document.getElementById('seStatus').value;
        var TY = {'Standard':'p-gray'};
        var ST = {'Available':'p-green','Taken':'p-red','Maintenance':'p-yellow'};
        var data = seats.filter(function(s){
          return (!q || s.seat_number.toLowerCase().includes(q) || s.seat_id.toLowerCase().includes(q))
              && (!sf || s.screen_id===sf)
              && (!st || s.status===st);
        });
        makeTable(data, 6, function(s){
          return '<td class="td-mono">'+s.seat_id+'</td>'
            +'<td>'+ScrN(s.screen_id)+'</td>'
            +'<td class="td-bold">'+s.seat_number+'</td>'
            +'<td><span class="pill '+(ST[s.status]||'')+'">'+s.status+'</span></td>'
            +'<td style="text-align:center"><div class="actions" style="justify-content:center"><button class="btn btn-ghost btn-sm" onclick="vSeat(\''+s.seat_id+'\')">View</button><button class="btn btn-ghost btn-sm" onclick="eSeat(\''+s.seat_id+'\')">Edit</button></div></td>';
        }, 'seBody','seCount','sePag',9999,sePg);
        document.getElementById('sePag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderSeats); });
      }

      function vSeat(id){
        var s  = seats.find(function(x){return x.seat_id===id;});
        var ST = {'Available':'p-green','Taken':'p-red','Maintenance':'p-yellow'};
        showView('Seat Details',
          vf('Seat ID',s.seat_id)+vf('Screen',ScrN(s.screen_id))+vf('Seat Number',s.seat_number)+
          '<div class="vf"><div class="vf-label">Status</div><div class="vf-value"><span class="pill '+(ST[s.status]||'')+'">'+s.status+'</span></div></div>',
          function(){ eSeat(id); }
        );
      }

      function eSeat(id){
        var s = seats.find(function(x){return x.seat_id===id;});
        if(!s) return;
        ET = {entity:'seat', id};
        document.getElementById('fSeId').value   = s.seat_id;
        document.getElementById('fSeScr').value  = ScrN(s.screen_id);
        document.getElementById('fSeNum').value  = s.seat_number;
        document.getElementById('fSeStat').value = s.status;
        OM('seatModal');
      }

      function saveSeat(){
        var st = document.getElementById('fSeStat').value;
        if(ET.id){
          Object.assign(seats.find(function(x){return x.seat_id===ET.id;}), {status:st});
        }
        CM('seatModal');
        renderSeats();
        updateVisual();
      }

      document.querySelectorAll('.modal-overlay').forEach(function(o){
        o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
      });

      initSeatPicker();
      renderSeats();
    </script>
  </body>
</html>
