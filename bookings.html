<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Bookings — Cinema Admin</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  </head>
  <body>
    <div class="app" id="app"></div>

    <!-- BOOKING MODAL -->
    <div class="modal-overlay" id="bookingModal">
      <div class="modal">
        <div class="modal-header"><div class="modal-title" id="bkModalTitle">Add Booking</div><button class="modal-close" onclick="CM('bookingModal')">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Customer *</label>
              <select class="form-select" id="fBkCust">
                <option value="">Select customer</option>
                <option value="C001">Maria Santos</option><option value="C002">Juan dela Cruz</option>
                <option value="C003">Ana Reyes</option><option value="C004">Pedro Lim</option><option value="C005">Rosa Garcia</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Showtime *</label><select class="form-select" id="fBkSt"><option value="">Select showtime</option></select></div>
            <div class="form-group"><label class="form-label">Booking Date *</label><input class="form-input" id="fBkDate" type="date"/></div>
            <div class="form-group"><label class="form-label">Total Amount (₱) *</label><input class="form-input" id="fBkAmt" type="number" min="0" placeholder="600"/></div>
            <div class="form-group"><label class="form-label">Status *</label>
              <select class="form-select" id="fBkStat">
                <option value="">Select</option><option>Confirmed</option><option>Pending</option><option>Cancelled</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Booking ID (auto)</label><input class="form-input" id="fBkId" disabled style="opacity:.4"/></div>
          </div>
          <div class="form-err" id="bkErr"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-ghost" onclick="CM('bookingModal')">Cancel</button><button class="btn btn-primary" onclick="saveBooking()">Save Booking</button></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="layout.js"></script>
    <script>
      injectLayout({page:'bookings', title:'Bookings', sub:'Customer reservations', actionLabel:'+ Add Booking'});

      document.getElementById('pageContent').innerHTML = `
        <div class="toolbar">
          <div class="search-box"><span class="search-icon"><i class="fa-solid fa-magnifying-glass" style="color: #ff4520;"></i></span><input type="text" id="bkSearch" placeholder="Search customer, movie…" oninput="renderBookings()"></div>
          <select class="filter-select" id="bkStatus" onchange="renderBookings()">
            <option value="">All Statuses</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Pending">Pending</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Booking ID</th><th>Customer</th><th>Showtime</th><th>Booking Date</th><th>Total Amount</th><th>Status</th><th style="text-align:center">Actions</th></tr></thead>
            <tbody id="bkBody"></tbody>
          </table>
          <div class="table-footer"><div class="table-count" id="bkCount"></div><div class="pagination" id="bkPag"></div></div>
        </div>
      `;

      document.getElementById('topbarAction').onclick = function(){ openBookingModal('add'); };

      var ET = {entity:null, id:null};
      var bkPg = {v:1};
      var SC = {'Confirmed':'p-green','Pending':'p-yellow','Cancelled':'p-red'};

      function renderBookings(){
        var q  = document.getElementById('bkSearch').value.toLowerCase();
        var sf = document.getElementById('bkStatus').value;
        var data = bookings.filter(function(b){
          var st = showtimes.find(function(s){return s.showtime_id===b.showtime_id;});
          var movieName = st ? MN(st.movie_id).toLowerCase() : '';
          return (!q || b.customer_name.toLowerCase().includes(q) || movieName.includes(q))
              && (!sf || b.booking_status === sf);
        });
        makeTable(data, 7, function(b){
          return '<td class="td-mono">'+b.booking_id+'</td>'
            +'<td class="td-bold">'+b.customer_name+'</td>'
            +'<td>'+StL(b.showtime_id)+'</td>'
            +'<td>'+b.booking_date+'</td>'
            +'<td>₱'+b.total_amount.toLocaleString()+'</td>'
            +'<td><span class="pill '+(SC[b.booking_status]||'')+'">'+b.booking_status+'</span></td>'
            +'<td style="text-align:center">'+ABtns('vBooking(\''+b.booking_id+'\')','openBookingModal(\'edit\',\''+b.booking_id+'\')','dBooking(\''+b.booking_id+'\')')+'</td>';
        }, 'bkBody','bkCount','bkPag',8,bkPg);
        document.getElementById('bkPag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderBookings); });
      }

      function vBooking(id){
        var b = bookings.find(function(x){return x.booking_id===id;});
        showView('Booking Details',
          vf('Booking ID',b.booking_id)+vf('Customer',b.customer_name)+vf('Showtime',StL(b.showtime_id),true)+
          vf('Booking Date',b.booking_date)+vf('Total Amount','₱'+b.total_amount.toLocaleString())+
          '<div class="vf"><div class="vf-label">Status</div><div class="vf-value"><span class="pill '+(SC[b.booking_status]||'')+'">'+b.booking_status+'</span></div></div>',
          function(){ openBookingModal('edit', id); }
        );
      }

      function dBooking(id){
        var b = bookings.find(function(x){return x.booking_id===id;});
        showDelete('Delete Booking', b?.booking_id, function(){
          bookings = bookings.filter(function(x){return x.booking_id!==id;});
          renderBookings();
        });
      }

      function openBookingModal(mode, id){
        ET = {entity:'booking', id: mode==='edit' ? id : null};
        var b = mode==='edit' ? bookings.find(function(x){return x.booking_id===id;}) : null;
        document.getElementById('bkModalTitle').textContent = mode==='edit' ? 'Edit Booking' : 'Add Booking';
        document.getElementById('fBkId').value = b ? b.booking_id : 'BK-'+String(bkCtr+1).padStart(5,'0');
        var ss = document.getElementById('fBkSt');
        ss.innerHTML = '<option value="">Select showtime</option>';
        showtimes.forEach(function(s){ var o=document.createElement('option'); o.value=s.showtime_id; o.textContent=StL(s.showtime_id); ss.appendChild(o); });
        if(b){
          document.getElementById('fBkCust').value = b.customer_id;
          ss.value = b.showtime_id;
          document.getElementById('fBkDate').value  = b.booking_date;
          document.getElementById('fBkAmt').value   = b.total_amount;
          document.getElementById('fBkStat').value  = b.booking_status;
        } else {
          ['fBkCust','fBkDate','fBkAmt','fBkStat'].forEach(function(x){ document.getElementById(x).value=''; });
        }
        document.getElementById('bkErr').style.display='none';
        OM('bookingModal');
      }

      function saveBooking(){
        var cu = document.getElementById('fBkCust').value;
        var sh = document.getElementById('fBkSt').value;
        var dt = document.getElementById('fBkDate').value;
        var am = +document.getElementById('fBkAmt').value;
        var st = document.getElementById('fBkStat').value;
        var cuMap = {C001:'Maria Santos',C002:'Juan dela Cruz',C003:'Ana Reyes',C004:'Pedro Lim',C005:'Rosa Garcia'};
        var e = document.getElementById('bkErr');
        if(!cu||!sh||!dt||!am||!st){e.textContent='Please fill in all required fields.';e.style.display='block';return;}
        e.style.display='none';
        if(ET.id){
          Object.assign(bookings.find(function(x){return x.booking_id===ET.id;}), {customer_id:cu,customer_name:cuMap[cu]||cu,showtime_id:sh,booking_date:dt,total_amount:am,booking_status:st});
        } else {
          bkCtr++;
          bookings.unshift({booking_id:'BK-'+String(bkCtr).padStart(5,'0'),customer_id:cu,customer_name:cuMap[cu]||cu,showtime_id:sh,booking_date:dt,total_amount:am,booking_status:st});
        }
        CM('bookingModal');
        renderBookings();
      }

      document.querySelectorAll('.modal-overlay').forEach(function(o){
        o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
      });

      renderBookings();
    </script>
  </body>
</html>
