<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Customers — Cinema Admin</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div class="app" id="app"></div>

<!-- CUSTOMER MODAL -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="cuModalTitle">Add Customer</div>
      <button class="modal-close" onclick="CM('customerModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">First Name *</label><input class="form-input" id="fCuFirst" placeholder="e.g. Maria"/></div>
        <div class="form-group"><label class="form-label">Last Name *</label><input class="form-input" id="fCuLast" placeholder="e.g. Santos"/></div>
        <div class="form-group full"><label class="form-label">Email *</label><input class="form-input" id="fCuEmail" type="email" placeholder="maria@example.com"/></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" id="fCuPhone" placeholder="09XX-XXX-XXXX"/></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="fCuStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Suspended">Suspended</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Customer ID (auto)</label><input class="form-input" id="fCuId" disabled style="opacity:.4"/></div>
        <div class="form-group"><label class="form-label">Joined Date</label><input class="form-input" id="fCuJoined" type="date"/></div>
      </div>
      <div class="form-err" id="cuErr"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="CM('customerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="layout.js"></script>
<script>
injectLayout({page:'customers', title:'Customers', sub:'Customer accounts', actionLabel:'+ Add Customer'});

/*
 * ── PHP/MySQL Integration Notes ────────────────────────────────────────────
 * READ  → GET  api/customers.php           (route to SLAVE  DB)
 * WRITE → POST api/customers.php           (route to MASTER DB)
 * EDIT  → PUT  api/customers.php?id=C001   (route to MASTER DB)
 * DEL   → DELETE api/customers.php?id=C001 (route to MASTER DB)
 *
 * SQL schema:
 * CREATE TABLE customers (
 *   customer_id   VARCHAR(10)  PRIMARY KEY,
 *   first_name    VARCHAR(80)  NOT NULL,
 *   last_name     VARCHAR(80)  NOT NULL,
 *   email         VARCHAR(150) NOT NULL UNIQUE,
 *   phone_number  VARCHAR(20),
 *   password      VARCHAR(255),
 *   status        ENUM('Active','Inactive','Suspended') DEFAULT 'Active',
 *   created_at    DATETIME DEFAULT CURRENT_TIMESTAMP
 * );
 */

var customers = [
  {customer_id:'C001', first_name:'Maria',  last_name:'Santos',    email:'maria.santos@email.com',   phone:'0917-234-5678', status:'Active',    created_at:'2025-01-10'},
  {customer_id:'C002', first_name:'Juan',   last_name:'dela Cruz', email:'juan.delacruz@email.com',  phone:'0918-876-5432', status:'Active',    created_at:'2025-02-14'},
  {customer_id:'C003', first_name:'Ana',    last_name:'Reyes',     email:'ana.reyes@email.com',      phone:'0919-345-6789', status:'Active',    created_at:'2025-03-01'},
  {customer_id:'C004', first_name:'Pedro',  last_name:'Lim',       email:'pedro.lim@email.com',      phone:'0920-456-7890', status:'Inactive',  created_at:'2025-03-22'},
  {customer_id:'C005', first_name:'Rosa',   last_name:'Garcia',    email:'rosa.garcia@email.com',    phone:'0921-567-8901', status:'Active',    created_at:'2025-04-05'},
  {customer_id:'C006', first_name:'Carlo',  last_name:'Reyes',     email:'carlo.reyes@email.com',    phone:'0922-678-9012', status:'Active',    created_at:'2025-04-18'},
  {customer_id:'C007', first_name:'Liza',   last_name:'Mendoza',   email:'liza.mendoza@email.com',   phone:'0923-789-0123', status:'Suspended', created_at:'2025-05-02'},
  {customer_id:'C008', first_name:'Mark',   last_name:'Torres',    email:'mark.torres@email.com',    phone:'0924-890-1234', status:'Active',    created_at:'2025-06-10'},
];

var cuCtr = customers.length;
var ET    = {entity:null, id:null};
var cuPg  = {v:1};
var STATUS_CLR = {Active:'p-green', Inactive:'p-gray', Suspended:'p-red'};

document.getElementById('pageContent').innerHTML = `
<div class="toolbar">
  <div class="search-box"><span class="search-icon"><i class="fa-solid fa-magnifying-glass" style="color: #ff4520;"></i></span><input type="text" id="cuSearch" placeholder="Search name, email, ID…" oninput="renderCustomers()"/></div>
  <select class="filter-select" id="cuStatus" onchange="renderCustomers()">
    <option value="">All Status</option>
    <option value="Active">Active</option>
    <option value="Inactive">Inactive</option>
    <option value="Suspended">Suspended</option>
  </select>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Customer ID</th><th>Full Name</th><th>Email</th><th>Phone</th>
        <th>Status</th><th>Joined</th><th>Bookings</th><th style="text-align:center">Actions</th>
      </tr>
    </thead>
    <tbody id="cuBody"></tbody>
  </table>
  <div class="table-footer"><div class="table-count" id="cuCount"></div><div class="pagination" id="cuPag"></div></div>
</div>`;

document.getElementById('topbarAction').onclick = function(){ openCustomerModal('add'); };

function renderCustomers(){
  var q  = document.getElementById('cuSearch').value.toLowerCase();
  var sf = document.getElementById('cuStatus').value;
  var data = customers.filter(function(c){
    var full = (c.first_name+' '+c.last_name).toLowerCase();
    return (!q || full.includes(q) || c.email.toLowerCase().includes(q) || c.customer_id.toLowerCase().includes(q))
        && (!sf || c.status===sf);
  });
  makeTable(data, 8, function(c){
    var bkCount = bookings.filter(function(b){return b.customer_id===c.customer_id;}).length;
    return '<td class="td-mono">'+c.customer_id+'</td>'
      +'<td class="td-bold">'+c.first_name+' '+c.last_name+'</td>'
      +'<td style="font-size:12px;color:var(--text-secondary)">'+c.email+'</td>'
      +'<td class="td-muted">'+c.phone+'</td>'
      +'<td><span class="pill '+(STATUS_CLR[c.status]||'p-gray')+'">'+c.status+'</span></td>'
      +'<td class="td-muted">'+c.created_at+'</td>'
      +'<td><span style="font-size:12px;font-weight:700;color:var(--primary)">'+bkCount+'</span></td>'
      +'<td style="text-align:center">'+ABtns('vCustomer(\''+c.customer_id+'\')','openCustomerModal(\'edit\',\''+c.customer_id+'\')','dCustomer(\''+c.customer_id+'\')')+'</td>';
  }, 'cuBody','cuCount','cuPag', 8, cuPg);
  document.getElementById('cuPag').querySelectorAll('.page-btn').forEach(function(b){ b.addEventListener('repage', renderCustomers); });
}

function vCustomer(id){
  var c = customers.find(function(x){return x.customer_id===id;});
  var bkList = bookings.filter(function(b){return b.customer_id===id;});
  var bkHtml = bkList.length
    ? bkList.map(function(b){
        var cl = b.booking_status==='Confirmed'?'p-green':b.booking_status==='Pending'?'p-yellow':'p-red';
        return '<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text-secondary)">'+b.booking_id+' — ₱'+b.total_amount.toLocaleString()+' <span class="pill '+cl+'">'+b.booking_status+'</span></div>';
      }).join('')
    : '<div style="font-size:12px;color:var(--text-muted)">No bookings yet</div>';
  showView(c.first_name+' '+c.last_name,
    vf('Customer ID',c.customer_id)+vf('Full Name',c.first_name+' '+c.last_name)+
    vf('Email',c.email)+vf('Phone',c.phone)+
    '<div class="vf"><div class="vf-label">Status</div><div class="vf-value"><span class="pill '+(STATUS_CLR[c.status]||'')+'">'+c.status+'</span></div></div>'+
    vf('Joined',c.created_at)+
    '<div class="vf full"><div class="vf-label">Booking History ('+bkList.length+')</div><div class="vf-value" style="margin-top:6px">'+bkHtml+'</div></div>',
    function(){ openCustomerModal('edit', id); }
  );
}

function dCustomer(id){
  var c = customers.find(function(x){return x.customer_id===id;});
  showDelete('Delete Customer', c.first_name+' '+c.last_name, function(){
    customers = customers.filter(function(x){return x.customer_id!==id;});
    renderCustomers();
  });
}

function openCustomerModal(mode, id){
  ET = {entity:'customer', id: mode==='edit'?id:null};
  var c = mode==='edit' ? customers.find(function(x){return x.customer_id===id;}) : null;
  document.getElementById('cuModalTitle').textContent = mode==='edit'?'Edit Customer':'Add Customer';
  document.getElementById('fCuId').value     = c ? c.customer_id : 'C'+String(cuCtr+1).padStart(3,'0');
  document.getElementById('fCuFirst').value  = c ? c.first_name  : '';
  document.getElementById('fCuLast').value   = c ? c.last_name   : '';
  document.getElementById('fCuEmail').value  = c ? c.email       : '';
  document.getElementById('fCuPhone').value  = c ? c.phone       : '';
  document.getElementById('fCuStatus').value = c ? c.status      : 'Active';
  document.getElementById('fCuJoined').value = c ? c.created_at  : new Date().toISOString().split('T')[0];
  document.getElementById('cuErr').style.display='none';
  OM('customerModal');
}

function saveCustomer(){
  var fn=document.getElementById('fCuFirst').value.trim(), ln=document.getElementById('fCuLast').value.trim();
  var em=document.getElementById('fCuEmail').value.trim(), ph=document.getElementById('fCuPhone').value.trim();
  var st=document.getElementById('fCuStatus').value,       jn=document.getElementById('fCuJoined').value;
  var e=document.getElementById('cuErr');
  if(!fn||!ln||!em){e.textContent='Please fill in all required fields.';e.style.display='block';return;}
  e.style.display='none';
  if(ET.id){
    Object.assign(customers.find(function(x){return x.customer_id===ET.id;}),{first_name:fn,last_name:ln,email:em,phone:ph,status:st,created_at:jn});
  } else {
    cuCtr++;
    customers.unshift({customer_id:'C'+String(cuCtr).padStart(3,'0'),first_name:fn,last_name:ln,email:em,phone:ph,status:st,created_at:jn});
  }
  CM('customerModal'); renderCustomers();
}

document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});
});
renderCustomers();
</script>
</body>
</html>
